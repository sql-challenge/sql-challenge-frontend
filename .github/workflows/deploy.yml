name: Build & Deploy Frontend

on:
  push:
    branches:
      - main
      - feat/**
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "IMAGE_TAG=latest"       >> $GITHUB_OUTPUT
            echo "DEPLOY_ENV=production" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=staging"      >> $GITHUB_OUTPUT
            echo "DEPLOY_ENV=staging"    >> $GITHUB_OUTPUT
          fi
          echo "SHA_TAG=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/opt/apps/sql-challenge/frontend"
            IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
            SHA_TAG="${{ steps.tag.outputs.SHA_TAG }}"
            DEPLOY_ENV="${{ steps.tag.outputs.DEPLOY_ENV }}"

            echo "=== Deploy: env=$DEPLOY_ENV tag=$IMAGE_TAG sha=$SHA_TAG ==="
            cd $DEPLOY_DIR

            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            ENV_FILE=".env.${DEPLOY_ENV}"
            [ -f "$ENV_FILE" ] || { echo "❌ $ENV_FILE não encontrado"; exit 1; }

            IMAGE_TAG=$IMAGE_TAG docker compose --env-file $ENV_FILE up -d --build
            docker tag sql-challenge-frontend:$IMAGE_TAG sql-challenge-frontend:$SHA_TAG

            docker images sql-challenge-frontend --format "{{.ID}}" | tail -n +4 | xargs -r docker rmi -f || true
            echo "✅ Deploy: sql-challenge-frontend:$IMAGE_TAG ($SHA_TAG)"
