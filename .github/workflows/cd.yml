name: CD

# ┌─ dev  ──► staging    (porta 3011, basePath /sql-challenge-staging)
# └─ main ──► production (porta 3001, basePath /sql-challenge)

on:
  push:
    branches: [main, dev]

jobs:
  # ── 1. Lint + Build (obrigatório antes do deploy) ────────────
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_PATH:    /sql-challenge
      NEXT_PUBLIC_API_PORT:     3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ── 2. Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: lint-build

    steps:
      - name: Resolver ambiente
        id: env
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "DEPLOY_ENV=production"                    >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=latest"                         >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.yml"          >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_ENV=staging"                               >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=staging"                                >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.staging.yml"          >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_ENV="${{ steps.env.outputs.DEPLOY_ENV }}"
            IMAGE_TAG="${{ steps.env.outputs.IMAGE_TAG }}"
            COMPOSE_FILE="${{ steps.env.outputs.COMPOSE_FILE }}"
            DEPLOY_DIR="/opt/apps/sql-challenge/frontend"

            echo "=== Deploy: env=$DEPLOY_ENV tag=$IMAGE_TAG ==="
            cd "$DEPLOY_DIR"

            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            ENV_FILE=".env.${DEPLOY_ENV}"
            [ -f "$ENV_FILE" ] || { echo "❌ $ENV_FILE não encontrado na VPS"; exit 1; }

            IMAGE_TAG=$IMAGE_TAG docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --build
            docker image prune -f

            echo "✅ Frontend $DEPLOY_ENV deployado com sucesso"

      - name: Notificar falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CD ${{ steps.env.outputs.DEPLOY_ENV }} falhou — ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: SQL Challenge CD <${{ secrets.MAIL_USERNAME }}>
          body: |
            O pipeline de CD (frontend) falhou.

            Ambiente    : ${{ steps.env.outputs.DEPLOY_ENV }}
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os detalhes em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
