name: CD

# ┌─ dev  ──► staging    (porta 3011, basePath /sql-challenge-staging)
# └─ main ──► production (porta 3001, basePath /sql-challenge)

on:
  push:
    branches: [main, dev]

jobs:
  # ── 1. Lint + Build ───────────────────────────────────────────
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_PATH:    /sql-challenge
      NEXT_PUBLIC_API_PORT:     3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ── 2. Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: lint-build

    steps:
      - name: Resolver ambiente
        id: env
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "DEPLOY_ENV=production"                                   >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=latest"                                        >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.yml"                         >> $GITHUB_OUTPUT
            echo "API_BASE_URL=https://apihub-macedo.duckdns.org"          >> $GITHUB_OUTPUT
            echo "BASE_PATH=/sql-challenge"                                >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_ENV=staging"                                              >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=staging"                                               >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.staging.yml"                         >> $GITHUB_OUTPUT
            echo "API_BASE_URL=https://apihub-macedo.duckdns.org/staging"          >> $GITHUB_OUTPUT
            echo "BASE_PATH=/sql-challenge-staging"                                >> $GITHUB_OUTPUT
          fi

      - name: Escrever .env na VPS e fazer deploy
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_ENV:               ${{ steps.env.outputs.DEPLOY_ENV }}
          IMAGE_TAG:                ${{ steps.env.outputs.IMAGE_TAG }}
          COMPOSE_FILE:             ${{ steps.env.outputs.COMPOSE_FILE }}
          API_BASE_URL:             ${{ steps.env.outputs.API_BASE_URL }}
          BASE_PATH:                ${{ steps.env.outputs.BASE_PATH }}
          FB_API_KEY:               ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN:           ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID:            ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET:        ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID:   ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID:                ${{ secrets.FB_APP_ID }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_ENV,IMAGE_TAG,COMPOSE_FILE,API_BASE_URL,BASE_PATH,FB_API_KEY,FB_AUTH_DOMAIN,FB_PROJECT_ID,FB_STORAGE_BUCKET,FB_MESSAGING_SENDER_ID,FB_APP_ID
          script: |
            set -e
            DEPLOY_DIR="/home/admin/sql-challenge-frontend"
            ENV_FILE="$DEPLOY_DIR/.env.${DEPLOY_ENV}"

            echo "=== Escrevendo $ENV_FILE ==="
            cat > "$ENV_FILE" << EOF
            NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL}
            NEXT_PUBLIC_BASE_PATH=${BASE_PATH}
            NEXT_PUBLIC_FIREBASE_API_KEY=${FB_API_KEY}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FB_AUTH_DOMAIN}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FB_PROJECT_ID}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FB_STORAGE_BUCKET}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FB_MESSAGING_SENDER_ID}
            NEXT_PUBLIC_FIREBASE_APP_ID=${FB_APP_ID}
            EOF
            chmod 600 "$ENV_FILE"

            echo "=== Deploy: env=$DEPLOY_ENV tag=$IMAGE_TAG ==="
            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            IMAGE_TAG=$IMAGE_TAG docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" build --no-cache
            IMAGE_TAG=$IMAGE_TAG docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d
            docker image prune -f
            echo "✅ Frontend $DEPLOY_ENV deployado"

      - name: Notificar falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CD ${{ steps.env.outputs.DEPLOY_ENV }} falhou — ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: SQL Challenge CD <${{ secrets.MAIL_USERNAME }}>
          body: |
            O pipeline de CD (frontend) falhou.

            Ambiente    : ${{ steps.env.outputs.DEPLOY_ENV }}
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os detalhes em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
